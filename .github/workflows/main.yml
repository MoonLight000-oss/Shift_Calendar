name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: kivy/buildozer:latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip
    
    - name: Initialize Buildozer
      run: |
        buildozer init
        
    - name: Configure Buildozer
      run: |
        # Настраиваем buildozer.spec
        sed -i 's/#\?android.api = .*/android.api = 30/' buildozer.spec
        sed -i 's/#\?android.minapi = .*/android.minapi = 21/' buildozer.spec
        sed -i 's/#\?android.ndk = .*/android.ndk = 25b/' buildozer.spec
        sed -i 's/#\?android.accept_sdk_license.*/android.accept_sdk_license = True/' buildozer.spec
        
        echo "Config:"
        cat buildozer.spec | grep -E "android.api|android.ndk|android.minapi"
    
    - name: Build APK
      run: |
        # Создаем папку для .buildozer чтобы сохранить кэш
        mkdir -p .buildozer
        buildozer -v android debug
      continue-on-error: false
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: shift-calendar-apk
        path: bin/*.apk
        if-no-files-found: error
