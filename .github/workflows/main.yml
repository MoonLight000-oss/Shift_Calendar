name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: kivy/buildozer:latest
    
    # Разрешаем работу от имени root (нужно для Docker-образа)
    env:
      BUILDOZER_ALLOW_ROOT: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🛠 ШАГ 1: Инициализация и настройка buildozer.spec
      - name: Init & Configure Buildozer
        run: |
          # Принудительно переходим в папку с вашим кодом
          cd $GITHUB_WORKSPACE
          
          echo "📂 Текущая папка: $(pwd)"
          echo "📄 Файлы в папке:"
          ls -la
          
          # Создаём файл, если его нет в репозитории
          if [ ! -f buildozer.spec ]; then
            echo "🔧 Файл buildozer.spec не найден, создаю..."
            buildozer init
          fi
          
          # 🔑 Настраиваем критически важные параметры
          sed -i 's/^#\?android.api = .*/android.api = 30/' buildozer.spec
          sed -i 's/^#\?android.minapi = .*/android.minapi = 21/' buildozer.spec
          sed -i 's/^#\?android.ndk = .*/android.ndk = 25b/' buildozer.spec
          sed -i 's/^#\?requirements = .*/requirements = python3,kivy/' buildozer.spec
          sed -i 's/^#\?android.accept_sdk_license.*/android.accept_sdk_license = True/' buildozer.spec
          
          echo "✅ Настройки применены:"
          grep -E "title|android.api|android.minapi|android.ndk|requirements|accept" buildozer.spec

      # 🏗 ШАГ 2: Сборка
      - name: Build APK
        run: |
          cd $GITHUB_WORKSPACE
          # yes | автоматически отвечает "да" на запрос лицензий, если spec не сработает
          yes | buildozer -v android debug
        continue-on-error: false

      # 📦 ШАГ 3: Загрузка результата
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: shift-calendar-apk
          path: bin/*.apk
          if-no-files-found: error
