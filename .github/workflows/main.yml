name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: kivy/buildozer:latest
    
    # 👇 Разрешаем запуск от root на уровне всего job
    env:
      BUILDOZER_ALLOW_ROOT: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Init & Build
        run: |
          cd $GITHUB_WORKSPACE
          
          # 👇 Жёстко экспортируем переменную для текущего шелла
          export BUILDOZER_ALLOW_ROOT=1
          
          echo "📂 Файлы в папке:"
          ls -la
          
          # Если нет buildozer.spec — создаём
          if [ ! -f buildozer.spec ]; then
            echo "🔧 Создаю buildozer.spec..."
            buildozer init
          fi
          
          # 🔑 Настраиваем критические параметры
          sed -i 's/^#\?android.api = .*/android.api = 30/' buildozer.spec
          sed -i 's/^#\?android.minapi = .*/android.minapi = 21/' buildozer.spec
          sed -i 's/^#\?android.ndk = .*/android.ndk = 25b/' buildozer.spec
          sed -i 's/^#\?requirements = .*/requirements = python3,kivy/' buildozer.spec
          sed -i 's/^#\?android.accept_sdk_license.*/android.accept_sdk_license = True/' buildozer.spec
          
          echo "✅ Готовые настройки:"
          grep -E "title|android.api|android.minapi|android.ndk|requirements|accept" buildozer.spec
          
          # 🚀 Запускаем сборку (yes | автоматически отвечает на запросы лицензий)
          yes | buildozer -v android debug
        # 👇 Дублируем переменную на уровне шага для надёжности
        env:
          BUILDOZER_ALLOW_ROOT: "1"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: shift-calendar-apk
          path: bin/*.apk
          if-no-files-found: error
